name : fronted workshop demo

on:
  push:
    branches:
        - 'feature/**'
        - 'bugfix/**'
        - 'chore/**'
        - main #อย่าลืมลบ ถ้าใช้ flow ปกติ

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps: 
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
              node-version: '24.x'
              cache: 'npm'
        - run: npm ci # clean install ใช้ npm ci แทน npm install
        - run: npm run lint
       


