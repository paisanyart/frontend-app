name : fronted workshop demo

on:
  push:
    branches:
        - 'feature/**'
        - 'bugfix/**'
        - 'chore/**'
        - main #อย่าลืมลบ ถ้าใช้ flow ปกติ

  pull_request:
    branches:
      - main       

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps: 
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
              node-version: '24.x'
              cache: 'npm'
        - run: npm ci # clean install ใช้ npm ci แทน npm install
        - run: npm run lint

  build-job:
    runs-on: ubuntu-latest
    needs: lint-job  # จะไม่ทำพร้อมกัน ใส่ needs ให้ทำส่วนนี้ก่อน
    steps: 
        - name: clone repo 
          uses: actions/checkout@v6
        - name: setup node.js version to 24.x
          uses: actions/setup-node@v6
          with:
              node-version: '24.x'
              cache: 'npm'
        - name: Install Dependencies
          run: npm ci # clean install ใช้ npm ci แทน npm install
        - name: Build Project
          run: npm run build


